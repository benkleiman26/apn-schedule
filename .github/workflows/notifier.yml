name: APN Lodge Notifier

# Cron uses UTC. Mountain Daylight Time = UTC-6.
#   07:00-15:00 MDT   = 13:00-21:00 UTC     -> "0,30 13-20 * * *"
#   15:00 MDT itself                        -> "0 21 * * *"     (covered above)
#   20:00 MDT (next-day pickup)             = 02:00 UTC next day -> "0 2 * * *"
#
# ~18 runs/day × ~2 min each ≈ 36 min/day, well under Actions' free tier.
#
# NOTE: Actions cron can drift several minutes under load. That's fine — the
# calendar handles reminders natively so we don't need precise fire times.

on:
  schedule:
    - cron: "0,30 13-20 * * *"   # 07:00-14:30 MDT
    - cron: "0 21 * * *"         # 15:00 MDT
    - cron: "0 2 * * *"          # 20:00 MDT (next-day pickup)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: apn-notifier
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install playwright certifi google-api-python-client google-auth

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: Install Chromium (if not cached)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install --with-deps chromium

      - name: Install Chromium deps only (when cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium

      - name: Run notifier
        env:
          KIPU_USER: ${{ secrets.KIPU_USER }}
          KIPU_PASSWORD: ${{ secrets.KIPU_PASSWORD }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
          GCAL_SA_JSON: ${{ secrets.GCAL_SA_JSON }}
          GCAL_CALENDAR_ID: ${{ secrets.GCAL_CALENDAR_ID }}
          APN_TIMEZONE: "America/Denver"
        run: python notifier.py

      - name: Commit + push state
        run: |
          git config user.name "APN Notifier Bot"
          git config user.email "actions@github.com"
          git add .state.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "no state changes to commit"
          else
            git commit -m "state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
